<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Boston</title>
</head>
<body>

<script>
   
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "/login.html";
    } else {
        if (user.rol === "admin") {
            window.location.href = "/admin";
        } else {
            window.location.href = "/panel";
        }
    }
</script>

</body>
</html>
